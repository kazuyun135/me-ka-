<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>発注書コンバーター | ナチュレワールド</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #2e2e2e;
    --accent: #d4a853;
    --accent2: #c4953f;
    --text: #e8e4dc;
    --text-muted: #6b6560;
    --success: #4caf7d;
    --error: #e05c5c;
    --warning: #e0a050;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 24px 40px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .logo-mark {
    width: 36px; height: 36px;
    background: var(--accent);
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    flex-shrink: 0;
  }
  .logo-text {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--text-muted);
    text-transform: uppercase;
    line-height: 1.4;
  }
  .logo-text strong { display: block; font-size: 13px; color: var(--accent); letter-spacing: 0.15em; }
  .header-right { margin-left: auto; font-family: 'Space Mono', monospace; font-size: 10px; color: var(--text-muted); letter-spacing: 0.1em; text-align: right; }

  .api-bar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 40px; display: flex; align-items: center; gap: 12px; }
  .api-label { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--text-muted); letter-spacing: 0.12em; white-space: nowrap; }
  .api-input { flex: 1; max-width: 380px; background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; padding: 7px 12px; font-family: 'Space Mono', monospace; font-size: 12px; color: var(--text); outline: none; transition: border-color 0.2s; }
  .api-input:focus { border-color: var(--accent); }
  .api-status { font-family: 'Space Mono', monospace; font-size: 10px; padding: 4px 10px; border-radius: 3px; letter-spacing: 0.08em; }
  .api-status.ok { background: rgba(76,175,125,0.15); color: var(--success); }
  .api-status.ng { background: rgba(224,92,92,0.15); color: var(--error); }

  main { flex: 1; padding: 40px; max-width: 960px; margin: 0 auto; width: 100%; }

  .drop-zone { border: 1px dashed var(--border); border-radius: 8px; padding: 64px 40px; text-align: center; cursor: pointer; transition: all 0.25s; background: var(--surface); }
  .drop-zone:hover, .drop-zone.dragover { border-color: var(--accent); background: rgba(212,168,83,0.04); }
  .drop-zone.dragover { transform: scale(1.005); }
  .drop-icon { width: 56px; height: 56px; margin: 0 auto 20px; opacity: 0.4; }
  .drop-icon svg { width: 100%; height: 100%; }
  .drop-title { font-size: 16px; font-weight: 500; margin-bottom: 8px; }
  .drop-sub { font-size: 12px; color: var(--text-muted); line-height: 1.6; }
  .drop-sub span { color: var(--accent); font-family: 'Space Mono', monospace; }
  #fileInput { display: none; }

  .file-list { margin-top: 20px; display: flex; flex-direction: column; gap: 8px; }
  .file-item { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 12px 16px; display: flex; align-items: center; gap: 12px; font-size: 13px; }
  .file-item-icon { width: 28px; height: 28px; background: rgba(212,168,83,0.1); border-radius: 4px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 14px; }
  .file-item-name { flex: 1; }
  .file-item-size { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--text-muted); }
  .file-item-remove { cursor: pointer; color: var(--text-muted); font-size: 16px; padding: 4px; border-radius: 3px; transition: color 0.15s; }
  .file-item-remove:hover { color: var(--error); }

  .run-btn { margin-top: 28px; width: 100%; padding: 16px; background: var(--accent); color: #0f0f0f; border: none; border-radius: 6px; font-family: 'Noto Sans JP', sans-serif; font-size: 15px; font-weight: 700; letter-spacing: 0.08em; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 10px; }
  .run-btn:hover:not(:disabled) { background: var(--accent2); transform: translateY(-1px); }
  .run-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

  .progress-wrap { margin-top: 32px; display: none; }
  .progress-wrap.visible { display: block; }
  .progress-header { display: flex; justify-content: space-between; margin-bottom: 8px; font-family: 'Space Mono', monospace; font-size: 11px; color: var(--text-muted); }
  .progress-bar-bg { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s ease; width: 0%; }
  .progress-log { margin-top: 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 16px; font-family: 'Space Mono', monospace; font-size: 11px; line-height: 1.8; color: var(--text-muted); max-height: 200px; overflow-y: auto; }
  .log-line { display: flex; gap: 8px; }
  .log-line.ok .log-msg { color: var(--success); }
  .log-line.warn .log-msg { color: var(--warning); }
  .log-line.err .log-msg { color: var(--error); }
  .log-line.info .log-msg { color: var(--text); }
  .log-time { color: var(--text-muted); flex-shrink: 0; }

  .results-section { margin-top: 32px; display: none; }
  .results-section.visible { display: block; }
  .results-title { font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 0.15em; color: var(--text-muted); text-transform: uppercase; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
  .results-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .result-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .result-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden; }
  .result-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .result-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--accent); transform: scaleX(0); transition: transform 0.2s; }
  .result-card:hover::before { transform: scaleX(1); }
  .rc-supplier { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
  .rc-count { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--text-muted); }
  .rc-amount { margin-top: 10px; font-family: 'Space Mono', monospace; font-size: 13px; color: var(--accent); }
  .rc-icon { position: absolute; bottom: 12px; right: 14px; font-size: 18px; opacity: 0.25; }

  .dl-all-btn { width: 100%; padding: 14px; background: transparent; border: 1px solid var(--accent); color: var(--accent); border-radius: 6px; font-family: 'Noto Sans JP', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .dl-all-btn:hover { background: rgba(212,168,83,0.08); transform: translateY(-1px); }

  .unknown-section { margin-top: 20px; background: rgba(224,160,80,0.06); border: 1px solid rgba(224,160,80,0.25); border-radius: 8px; padding: 16px 20px; display: none; }
  .unknown-section.visible { display: block; }
  .unknown-title { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 0.12em; color: var(--warning); margin-bottom: 10px; }
  .unknown-item { font-size: 12px; color: var(--text-muted); padding: 4px 0; border-bottom: 1px solid var(--border); }
  .unknown-item:last-child { border-bottom: none; }

  footer { padding: 20px 40px; border-top: 1px solid var(--border); font-family: 'Space Mono', monospace; font-size: 10px; color: var(--text-muted); display: flex; gap: 24px; }

  ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .spinner { width: 16px; height: 16px; border: 2px solid rgba(15,15,15,0.3); border-top-color: #0f0f0f; border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  #renderCanvas { position: absolute; left: -9999px; top: 0; }
</style>
</head>
<body>

<header>
  <div class="logo-mark"></div>
  <div class="logo-text"><strong>NATURÉ WORLD</strong>発注書コンバーター</div>
  <div class="header-right">v1.1.0<br>NISHIYODOGAWA / KYOTO / NARA DC</div>
</header>

<div class="api-bar">
  <span class="api-label">ANTHROPIC API KEY</span>
  <input type="password" class="api-input" id="apiKey" placeholder="sk-ant-..." autocomplete="off">
  <span class="api-status ng" id="apiStatus">UNSET</span>
</div>

<main>
  <div class="drop-zone" id="dropZone">
    <input type="file" id="fileInput" accept=".pdf,.jpg,.jpeg,.png" multiple>
    <div class="drop-icon">
      <svg viewBox="0 0 56 56" fill="none"><path d="M14 42H42M28 10V34M28 10L20 18M28 10L36 18" stroke="#d4a853" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><rect x="4" y="4" width="48" height="48" rx="8" stroke="#d4a853" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.4"/></svg>
    </div>
    <div class="drop-title">名畑DC 発注書をドロップ</div>
    <div class="drop-sub">複数ファイル同時対応 ／ クリックでファイル選択<br><span>PDF</span> ／ <span>JPG</span> ／ <span>PNG</span> 対応</div>
  </div>

  <div class="file-list" id="fileList"></div>
  <button class="run-btn" id="runBtn" disabled>発注書を生成する</button>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-header"><span id="progressLabel">処理中...</span><span id="progressPct">0%</span></div>
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill"></div></div>
    <div class="progress-log" id="progressLog"></div>
  </div>

  <div class="unknown-section" id="unknownSection">
    <div class="unknown-title">⚠ UNREGISTERED — マスタ未登録商品（要確認）</div>
    <div id="unknownList"></div>
  </div>

  <div class="results-section" id="resultsSection">
    <div class="results-title">生成された発注書</div>
    <div class="result-cards" id="resultCards"></div>
    <button class="dl-all-btn" id="dlAllBtn">⬇ 全仕入先まとめてZIPダウンロード</button>
  </div>
</main>

<!-- 日本語PDF描画用Canvas（画面外） -->
<canvas id="renderCanvas"></canvas>

<footer>
  <span>NATURÉ WORLD K.K. — AKASHI, HYOGO</span>
  <span>PDFデータはサーバーに保存されません</span>
</footer>

<script>

  "994094": { name: "四国特紙 白檀の香り トイレットペーパー 30m×12R", spec:"12R×8", jan:"4901733320709", unitPrice: 7520, supplier: "シモジマ" },
  "994095": { name: "OPPシート #25 20-20", spec:"1000枚入", jan:"4901755466218", unitPrice: 8600, supplier: "シモジマ" },
  "994096": { name: "HEIKO H25チャームバッグ S2 未晒無地", spec:"500枚入", jan:"4901755348293", unitPrice: 5232, supplier: "シモジマ" },
  "156922": { name: "摂津 キッチンブリーチ 5kg", spec:"5kg×3本", jan:"4973389117248", unitPrice: 1500, supplier: "セッツ" },
  "164000": { name: "摂津製油 ダイバークリーンコンク 5kg（6倍濃縮・食器洗剤）", spec:"5kg×3本", jan:"4973389130469", unitPrice: 5550, supplier: "セッツ" },

  "194606": { name: "NCW-80 カウンタークロス厚手レギュラー グリーン 80枚 300×600", spec:"80枚×12", jan:"4945274959004", unitPrice: 9600, supplier: "ヒメプラ" },
  "194184": { name: "溝端紙工 不織布ソフトエプロン（白）100枚入", spec:"100枚×10", jan:"", unitPrice: 7600, supplier: "溝端紙工" },
  "194185": { name: "溝端紙工 不織布ソフトエプロン（黒）100枚入", spec:"100枚×10", jan:"", unitPrice: 8550, supplier: "溝端紙工" },
  "NE-30":  { name: "NE-30 保冷剤 30g 500入", spec:"500個入", jan:"", unitPrice: 1300, supplier: "博洋" },
};

const JAN_MAP = {};
for (const [code, p] of Object.entries(PRODUCT_MASTER)) {
  if (p.jan) JAN_MAP[p.jan] = code;
}

let selectedFiles = [];
let generatedPDFs = {};

// ── UI ──
const dropZone  = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const runBtn    = document.getElementById('runBtn');
const apiKeyEl  = document.getElementById('apiKey');
const apiStatus = document.getElementById('apiStatus');

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('dragover'); handleFiles([...e.dataTransfer.files]); });
fileInput.addEventListener('change', () => handleFiles([...fileInput.files]));

apiKeyEl.addEventListener('input', () => {
  const ok = apiKeyEl.value.trim().startsWith('sk-ant-');
  apiStatus.textContent = ok ? 'SET' : 'UNSET';
  apiStatus.className = 'api-status ' + (ok ? 'ok' : 'ng');
  if (ok) localStorage.setItem('nw_api_key', apiKeyEl.value.trim());
  updateRunBtn();
});

// 起動時にAPIキーを復元
(function() {
  const saved = localStorage.getItem('nw_api_key');
  if (saved) {
    apiKeyEl.value = saved;
    apiStatus.textContent = 'SET';
    apiStatus.className = 'api-status ok';
  }
})();

function handleFiles(files) {
  files.filter(f => /\.(pdf|jpg|jpeg|png)$/i.test(f.name))
    .forEach(f => { if (!selectedFiles.find(x => x.name===f.name && x.size===f.size)) selectedFiles.push(f); });
  renderFileList(); updateRunBtn();
}

function renderFileList() {
  const fl = document.getElementById('fileList');
  fl.innerHTML = '';
  selectedFiles.forEach((f, i) => {
    const isImg = /\.(jpg|jpeg|png)$/i.test(f.name);
    const div = document.createElement('div');
    div.className = 'file-item';
    div.innerHTML = `<div class="file-item-icon">${isImg?'🖼️':'📄'}</div>
      <span class="file-item-name">${f.name}</span>
      <span class="file-item-size">${(f.size/1024).toFixed(0)} KB</span>
      <span class="file-item-remove" data-idx="${i}">✕</span>`;
    fl.appendChild(div);
  });
  fl.querySelectorAll('.file-item-remove').forEach(el =>
    el.addEventListener('click', () => { selectedFiles.splice(+el.dataset.idx, 1); renderFileList(); updateRunBtn(); }));
}

function updateRunBtn() {
  runBtn.disabled = !(apiKeyEl.value.trim().startsWith('sk-ant-') && selectedFiles.length > 0);
}

function setProgress(pct, label) {
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressLabel').textContent = label;
}
function addLog(msg, type='info') {
  const log = document.getElementById('progressLog');
  const div = document.createElement('div');
  div.className = `log-line ${type}`;
  div.innerHTML = `<span class="log-time">${new Date().toTimeString().slice(0,8)}</span><span class="log-msg">${msg}</span>`;
  log.appendChild(div); log.scrollTop = log.scrollHeight;
}

// ── PDF→画像 ──
async function pdfToImages(file) {
  const pdf = await pdfjsLib.getDocument({ data: await file.arrayBuffer() }).promise;
  const imgs = [];
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const vp = page.getViewport({ scale: 2.0 });
    const c = document.createElement('canvas');
    c.width = vp.width; c.height = vp.height;
    await page.render({ canvasContext: c.getContext('2d'), viewport: vp }).promise;
    imgs.push(c.toDataURL('image/jpeg', 0.88));
  }
  return imgs;
}

async function imageFileToBase64(file) {
  return new Promise((res, rej) => { const r = new FileReader(); r.onload = ()=>res(r.result); r.onerror=rej; r.readAsDataURL(file); });
}

// ── Claude API ──
async function extractOrder(images, apiKey, mediaType='image/jpeg') {
  const content = [];
  images.forEach((img, i) => {
    const b64 = img.includes(',') ? img.split(',')[1] : img;
    const mt  = img.includes('image/png') ? 'image/png' : mediaType;
    content.push({ type:"image", source:{ type:"base64", media_type:mt, data:b64 } });
    if (images.length > 1) content.push({ type:"text", text:`（${i+1}ページ目）` });
  });
  content.push({ type:"text", text:`この名畑様からの発注書から以下をJSONで抽出してください。
{
  "dc_name": "DC名（西淀川DC/京都DC/奈良DC）",
  "order_date": "YYYY/MM/DD",
  "delivery_date": "YYYY/MM/DD or null",
  "slip_numbers": ["伝票番号"],
  "items": [{"code":"商品コード6桁","jan":"JANコード13桁","name":"商品名","qty":数量}]
}
【発注書の列構造】
商品コード | 規格 | 入数 | JANコード | ケース | バラ | 入荷予定日

【絶対ルール】
- qtyには「ケース」列（左から6列目）の数字のみを使う
- 「入数」列（左から3列目）は商品の入り数であり絶対に使わない
- 例：入数=3、ケース=5 の場合 → qty=5
- janは13桁の数字をそのまま文字列で
- codeは左端の6桁商品コード
- qty=0またはケース列が空欄の商品は除外
- JSONのみ返す` });

  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{ 'Content-Type':'application/json', 'x-api-key':apiKey, 'anthropic-version':'2023-06-01', 'anthropic-dangerous-direct-browser-access':'true' },
    body: JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:2000, messages:[{role:'user',content}] })
  });
  if (!resp.ok) throw new Error(`API ${resp.status}`);
  const data = await resp.json();
  const match = data.content[0].text.trim().match(/\{[\s\S]*\}/);
  if (!match) throw new Error('JSON取得失敗');
  return JSON.parse(match[0]);
}

runBtn.addEventListener('click', async () => {
  const apiKey = apiKeyEl.value.trim();
  runBtn.disabled = true;
  runBtn.innerHTML = '<span class="spinner"></span> 処理中...';
  generatedPDFs = {};

  document.getElementById('progressWrap').classList.add('visible');
  document.getElementById('resultsSection').classList.remove('visible');
  document.getElementById('unknownSection').classList.remove('visible');
  document.getElementById('progressLog').innerHTML = '';
  document.getElementById('resultCards').innerHTML = '';

  const allItems = [], unknowns = [];

  try {
    for (let fi = 0; fi < selectedFiles.length; fi++) {
      const file = selectedFiles[fi];
      setProgress(Math.round(fi/selectedFiles.length*50), `解析中 (${fi+1}/${selectedFiles.length}): ${file.name}`);
      addLog(`📄 ${file.name}`, 'info');

      const isImage = /\.(jpg|jpeg|png)$/i.test(file.name);

      // ページ単位の画像リストを作る
      // 画像ファイル → 1枚だけ / PDF → 1ページずつ個別に処理
      let pageImages = [];
      if (isImage) {
        const dataUrl = await imageFileToBase64(file);
        const mt = file.name.toLowerCase().endsWith('.png') ? 'image/png' : 'image/jpeg';
        pageImages = [{ imgs: [dataUrl], mediaType: mt }];
        addLog('  → 画像として解析', 'info');
      } else {
        const allPages = await pdfToImages(file);
        addLog(`  → ${allPages.length}ページ画像化・1ページずつ解析`, 'info');
        // 1ページ = 1伝票として個別送信
        pageImages = allPages.map(img => ({ imgs: [img], mediaType: 'image/jpeg' }));
      }

      for (let pi = 0; pi < pageImages.length; pi++) {
        const { imgs, mediaType } = pageImages[pi];
        let extracted;
        try {
          extracted = await extractOrder(imgs, apiKey, mediaType);
          // 商品がない or dc_nameが取れないページはスキップ
          if (!extracted.dc_name || !extracted.items || extracted.items.length === 0) {
            addLog(`  ページ${pi+1}: 商品なし・スキップ`, 'info');
            continue;
          }
          addLog(`  ✓ ページ${pi+1}: ${extracted.dc_name} / ${extracted.items.length}商品`, 'ok');
        } catch(e) {
          addLog(`  ページ${pi+1}: 解析失敗 (${e.message})`, 'warn');
          continue;
        }

        (extracted.items||[]).forEach(item => {
          // JANを正規化（スペース・ハイフン・全角数字除去）してマッチ
          const rawJan = (item.jan||'').toString().replace(/[\s\-　]/g,'').replace(/[０-９]/g, c => String.fromCharCode(c.charCodeAt(0)-0xFEE0));
          // codeがマスタに存在する場合のみ使用、存在しなければJANで再検索
          const codeCandidate = (item.code && item.code !== 'null' && item.code !== 'undefined') ? item.code : null;
          const code = (codeCandidate && PRODUCT_MASTER[codeCandidate] ? codeCandidate : null)
                    || JAN_MAP[rawJan]
                    || null;
          const m    = code ? PRODUCT_MASTER[code] : null;
          if (m) {
            allItems.push({ dcName:extracted.dc_name, orderDate:extracted.order_date,
              deliveryDate:extracted.delivery_date, slipNums:extracted.slip_numbers||[],
              code, jan: m.jan||'', name:m.name, spec:m.spec, qty:item.qty, unitPrice:m.unitPrice, supplier:m.supplier });
          } else {
            // 未登録商品もそのまま発注書に含める（単価=0で空欄表示）
            addLog(`    ⚠ 未登録: ${item.name||'?'} (${item.code||item.jan||'?'}) → 発注書に含めます`, 'warn');
            allItems.push({ dcName:extracted.dc_name, orderDate:extracted.order_date,
              deliveryDate:extracted.delivery_date, slipNums:extracted.slip_numbers||[],
              code: item.code||'', jan: item.jan||'', name: item.name||'（商品名不明）',
              spec: item.spec||'', qty: item.qty, unitPrice: 0, supplier: '未登録' });
          }
        });
      }
    }

    setProgress(60, 'グルーピング中...');
    // dc_split=true(セッツ等) → DC×仕入先キー / false(オカモト等) → 仕入先キーのみ
    // 未登録商品を同DC・同伝票番号の既知仕入先に統合するマップを作成
    // まず登録済み商品でDC×伝票番号 → 仕入先のマップを作る
    const slipSupplierMap = {};
    allItems.forEach(it => {
      if (it.supplier !== '未登録') {
        (it.slipNums||[]).forEach(sn => {
          slipSupplierMap[`${it.dcName}__${sn}`] = it.supplier;
        });
      }
    });

    const byKey = {};
    allItems.forEach(it => {
      let supplier = it.supplier;

      if (supplier === '未登録') {

      if (!byKey[key]) byKey[key] = { items: [], supplier: supplier, dcName: (info.dc_split || supplier === '未登録') ? it.dcName : '全DC' };
      byKey[key].items.push({ ...it, supplier });
    });

    const keys = Object.keys(byKey);
    for (let si = 0; si < keys.length; si++) {
      const key      = keys[si];
      const { items, supplier, dcName } = byKey[key];
      // 代表DC（合算の場合は全商品のDCをまとめ、送り先は西淀川DC基準）
      const repDC    = dcName === '全DC' ? '西淀川DC' : dcName;
      // 合算の場合はDC名を「各DC」として表示
      const labelDC  = dcName === '全DC' ? '西淀川DC・京都DC・奈良DC合算' : dcName;

      setProgress(60 + Math.round(si/keys.length*35), `PDF生成: ${labelDC} / ${supplier}`);
      addLog(`📝 ${labelDC} × ${supplier} (${items.length}商品)`, 'info');

      const slipNums     = [...new Set(items.flatMap(i=>i.slipNums))];
      const orderDate    = items[0].orderDate;
      const deliveryDate = items[0].deliveryDate;

      const buf = await generateOrderPDF(supplier, repDC, orderDate, deliveryDate, slipNums, items, labelDC);
      generatedPDFs[key] = { buf, items, dcName: labelDC, supplier };
      addLog(`  ✓ ¥${items.reduce((s,i)=>s+i.qty*i.unitPrice,0).toLocaleString()}`, 'ok');
    }

    setProgress(100, '完了');
    addLog('━━ 全発注書生成完了 ━━', 'ok');

    if (unknowns.length) {
      document.getElementById('unknownSection').classList.add('visible');
      document.getElementById('unknownList').innerHTML =
        unknowns.map(u=>`<div class="unknown-item">【${u.code||'?'}】${u.name} × ${u.qty}ケース</div>`).join('');
    }

    document.getElementById('resultsSection').classList.add('visible');
    const rc = document.getElementById('resultCards');
    Object.entries(generatedPDFs).forEach(([key, data]) => {
      const total = data.items.reduce((s,i)=>s+i.qty*i.unitPrice,0);
      const card  = document.createElement('div');
      card.className = 'result-card';
      card.innerHTML = `<div class="rc-supplier">${data.supplier}</div>
        <div class="rc-count">${data.items.length} 商品 / ${data.dcName}</div>
        <div class="rc-amount">¥ ${total.toLocaleString()}</div>
        <div class="rc-icon">📋</div>`;
      card.onclick = () => downloadSingle(key);
      rc.appendChild(card);
    });
    document.getElementById('dlAllBtn').onclick = downloadAll;

  } catch(e) { addLog(`エラー: ${e.message}`, 'err'); console.error(e); }

  runBtn.disabled = false;
  runBtn.innerHTML = '発注書を生成する';
});

function downloadSingle(key) {
  const d = generatedPDFs[key]; if (!d) return;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([d.buf], {type:'application/pdf'}));
  a.download = `発注書_${d.dcName}_${d.supplier}_${new Date().toISOString().slice(0,10)}.pdf`;
  a.click();
}
async function downloadAll() {
  const zip = new JSZip();
  Object.entries(generatedPDFs).forEach(([key, d]) =>
    zip.file(`発注書_${d.dcName}_${d.supplier}_${new Date().toISOString().slice(0,10)}.pdf`, d.buf));
  const a = document.createElement('a');
  a.href = URL.createObjectURL(await zip.generateAsync({type:'blob'}));
  a.download = `発注書一式_${new Date().toISOString().slice(0,10)}.zip`;
  a.click();
}
</script>
</body>
</html>
